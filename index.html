<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>スロットマシンゲーム - cee-lo-rings</title>
    <style>
      html, body { margin: 0; padding: 0; background: #732121; overflow: hidden; }
      body { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
      canvas { display: block; }
      #loading {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        background: #732121; color: white; font-family: sans-serif; z-index: 10;
      }
      #loading-bar { width: 60%; height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; margin-top: 12px; overflow: hidden; }
      #loading-bar > div { height: 100%; width: 0%; background: white; transition: width 0.2s; }
    </style>
  </head>
  <body>
    <div id="loading">
      <div>Loading…</div>
      <div id="loading-bar"><div></div></div>
    </div>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
